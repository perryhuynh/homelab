---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: echo
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: echo
  values:
    replicaCount: 2
    config:
      kubernetes: true
      trustedProxies:
        - 10.42.0.0/16
    httpRoute:
      enabled: true
      hostnames:
        - "{{ .Release.Name }}.perryhuynh.com"
      parentRefs:
        - name: envoy-external
          namespace: networking
          sectionName: https
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 64Mi
