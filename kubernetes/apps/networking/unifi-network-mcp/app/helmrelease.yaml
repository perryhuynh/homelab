---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app unifi-network-mcp
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    controllers:
      unifi-network-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/sirkirby/unifi-network-mcp
              tag: 0.21.1@sha256:b77bc25d47db18a7f94cec9d8fa1a6351d5ac2b9bfe6020c861beab60c05e5ad
            env:
              UNIFI_MCP_ALLOWED_HOSTS: unifi-network-mcp.networking.svc.cluster.local:3000
              UNIFI_MCP_HTTP_ENABLED: true
              UNIFI_MCP_HTTP_TRANSPORT: streamable-http
              UNIFI_NETWORK_HOST: unifi.internal
              UNIFI_NETWORK_VERIFY_SSL: false
              UNIFI_POLICY_NETWORK_CREATE: false
              UNIFI_POLICY_NETWORK_DELETE: false
              UNIFI_POLICY_NETWORK_UPDATE: false
            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness:
                enabled: true
                spec:
                  tcpSocket:
                    port: &port 3000
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  tcpSocket:
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              limits:
                memory: 256Mi
              requests:
                cpu: 10m
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
    service:
      app:
        ports:
          http:
            port: *port
