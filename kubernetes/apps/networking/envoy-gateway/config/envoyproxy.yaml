---
# yaml-language-server: $schema=https://kubernetes-schemas.perry.cafe/gateway.envoyproxy.io/envoyproxy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy
spec:
  logging:
    level:
      default: info
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
        container:
          image: mirror.gcr.io/envoyproxy/envoy:v1.38.0
          resources:
            limits:
              memory: 2Gi
            requests:
              cpu: 100m
      envoyService:
        externalTrafficPolicy: Cluster
  shutdown:
    drainTimeout: 180s
  telemetry:
    metrics:
      prometheus:
        compression:
          type: Zstd
    tracing:
      # sample 100% of requests
      samplingRate: 100
      provider:
        backendRefs:
          - name: gateway-collector-headless
            namespace: observability
            port: 4317
        type: OpenTelemetry
      tags:
        "client.address": "%REQUEST_HEADER(CF-Connecting-IP)%"
        "cloudflare.country_code": "%REQUEST_HEADER(CF-IPCountry)%"
        "cloudflare.ray_id": "%REQUEST_HEADER(CF-Ray)%"
