---
# yaml-language-server: $schema=https://kubernetes-schemas.perry.cafe/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: intel-device-plugins-operator
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.34.0
  url: oci://ghcr.io/home-operations/charts-mirror/intel-device-plugins-operator
---
# yaml-language-server: $schema=https://kubernetes-schemas.perry.cafe/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-gpu-resource-driver
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: intel-gpu-resource-driver
  values:
    image:
      repository: ghcr.io/intel/intel-resource-drivers-for-kubernetes
    cdi:
      staticPath: /var/cdi/static
      dynamicPath: /var/cdi/dynamic
