---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kubernetes-mcp-server
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    image:
      registry: quay.io
      repository: containers/kubernetes_mcp_server
      # renovate: datasource=docker depName=quay.io/containers/kubernetes_mcp_server
      version: v0.0.64@sha256:2a6eef833ea5c458c0a7f52afc3b9f1fbfedce5aed3a56b451287a66a55bc336
    extraArgs:
      - --read-only
    ingress:
      enabled: false
    rbac:
      extraClusterRoleBindings:
        - name: view
          roleRef:
            name: view
            external: true
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 10m
