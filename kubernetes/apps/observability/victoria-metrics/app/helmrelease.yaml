---
# yaml-language-server: $schema=https://kubernetes-schemas.perry.cafe/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-metrics
  interval: 1h
  values:
    server:
      extraArgs:
        dedup.minScrapeInterval: 60s
      fullnameOverride: victoria-metrics
      retentionPeriod: 400d
      persistentVolume:
        storageClassName: ceph-block
        size: 200Gi
      resources:
        limits:
          memory: 2Gi
        requests:
          cpu: 10m
      serviceMonitor:
        enabled: true
