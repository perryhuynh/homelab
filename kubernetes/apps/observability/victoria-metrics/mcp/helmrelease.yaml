---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-metrics-mcp
  interval: 1h
  values:
    global:
      image:
        registry: mirror.gcr.io
    vm:
      type: single
      entrypoint: http://victoria-metrics.observability.svc.cluster.local:8428
    mcp:
      mode: http
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      readOnlyRootFilesystem: true
    route:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: networking
      hostnames:
        - victoria-metrics-mcp.perryhuynh.com
