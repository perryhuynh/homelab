---
# yaml-language-server: $schema=https://kubernetes-schemas.perry.cafe/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: snmp-exporter-ups-rules
spec:
  groups:
    - name: snmp-exporter-ups.rules
      rules:
        - alert: UPSOnBattery
          annotations:
            summary: ZPM {{$labels.instance}} is running on batteries and has less than 60 minutes of battery left
          expr: upsBasicBatteryTimeOnBattery_seconds > 60
          for: 1m
          labels:
            severity: critical
        - alert: UPSReplaceBattery
          expr: upsAdvBattery_needsreplacing > 0
          annotations:
            summary: >-
              ZPM {{ $labels.instance }} battery needs to be replaced
          for: 5m
          labels:
            severity: critical
