---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs-mcp
  interval: 1h
  values:
    vl:
      entrypoint: http://victoria-logs.observability.svc.cluster.local:9428
    mcp:
      mode: http
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 10m
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      readOnlyRootFilesystem: true
    route:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: networking
      hostnames:
        - victoria-logs-mcp.perryhuynh.com
