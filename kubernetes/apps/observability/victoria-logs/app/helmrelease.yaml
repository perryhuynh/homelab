---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  interval: 1h
  values:
    global:
      image:
        registry: mirror.gcr.io
    server:
      fullnameOverride: victoria-logs
      retentionPeriod: 90d
      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        size: 50Gi
      resources:
        limits:
          memory: 2Gi
        requests:
          cpu: 10m
      route:
        enabled: true
        hostnames:
          - logs.perryhuynh.com
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
      serviceMonitor:
        enabled: true
    dashboards:
      enabled: true
      grafanaOperator:
        enabled: true
        spec:
          folder: observability
