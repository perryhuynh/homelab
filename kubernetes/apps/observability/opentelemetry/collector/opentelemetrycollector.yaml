---
# yaml-language-server: $schema=https://kubernetes-schemas.perry.cafe/opentelemetry.io/opentelemetrycollector_v1beta1.json
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: filelog
spec:
  mode: daemonset
  serviceAccount: filelog-collector
  env:
    - name: KUBE_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
  volumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers
  volumeMounts:
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true
  config:
    receivers:
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          # Exclude logs from all containers named otc-container
          - /var/log/pods/*/otc-container/*.log
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          # parse container logs
          - type: container
            id: container-parser
          - type: json_parser
            on_error: send_quiet
    processors:
      batch: {}
      filter/exclude-auto-instrumented:
        logs:
          exclude:
            match_type: regexp
            resource_attributes:
              - key: otel.instrumented
                value: ".*"
      k8s_attributes:
        auth_type: "serviceAccount"
        passthrough: false
        filter:
          # only retrieve pods running on the same node as the collector
          node_from_env_var: KUBE_NODE_NAME
        extract:
          # The attributes provided in 'metadata' will be added to associated resources
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.daemonset.name
            - k8s.deployment.name # Requires watching Deployment resources. To avoid this, use deployment_name_from_replicaset instead.
            - k8s.statefulset.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
            - service.namespace
            - service.name
            - service.version
            - service.instance.id
          annotations:
            - tag_name: otel.autoinstrumented
              key_regex: instrumentation\.opentelemetry\.io/inject-.*
              from: pod
          labels:
            # This label extraction rule takes the value 'app.kubernetes.io/component' label and maps it to the 'app.label.component' attribute which will be added to the associated resources
            - tag_name: app.label.component
              key: app.kubernetes.io/component
              from: pod
          otel_annotations: true
        pod_association:
          - sources:
              # This rule associates all resources containing the 'k8s.pod.ip' attribute with the matching pods. If this attribute is not present in the resource, this rule will not be able to find the matching pod.
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              # This rule associates all resources containing the 'k8s.pod.uid' attribute with the matching pods. If this attribute is not present in the resource, this rule will not be able to find the matching pod.
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              # This rule will use the IP from the incoming connection from which the resource is received, and find the matching pod, based on the 'pod.status.podIP' of the observed pods
              - from: connection
      logdedup:
        interval: 60s
        log_count_attribute: dedup_count
        timezone: "America/Los_Angeles"
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
    exporters:
      debug: {}
      loadbalancing:
        routing_key: resource # routes by resource attributes, keeping logs from the same source on the same replica
        protocol:
          otlp:
            tls:
              insecure: true
        resolver:
          dns:
            hostname: gateway-collector-headless.observability.svc.cluster.local
    service:
      pipelines:
        logs:
          receivers:
            - filelog
          processors:
            - memory_limiter
            - k8s_attributes
            - filter/exclude-auto-instrumented
            - logdedup
            - batch
          exporters:
            - loadbalancing
      telemetry:
        metrics:
          readers:
            - periodic:
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: http://gateway-collector-headless.observability.svc.cluster.local:4318
---
# yaml-language-server: $schema=https://kubernetes-schemas.perry.cafe/opentelemetry.io/opentelemetrycollector_v1beta1.json
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: gateway
spec:
  mode: statefulset
  replicas: 2
  volumeMounts:
    - mountPath: /var/lib/otelcol/storage
      name: storage
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
        storageClassName: ceph-block
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - "ALL"
    readOnlyRootFilesystem: true
  podSecurityContext:
    runAsNonRoot: true
    runAsGroup: 1000
    runAsUser: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  config:
    connectors:
      servicegraph:
        latency_histogram_buckets: [100ms, 250ms, 1s, 5s, 10s]
        dimensions:
          - db.system
          - db.system.name
          - messaging.system
        virtual_node_peer_attributes:
          - db.system
          - db.system.name
          - messaging.system
          - peer.service
        virtual_node_extra_label: true
    extensions:
      file_storage:
        directory: /var/lib/otelcol/storage
    receivers:
      k8s_events:
        auth_type: serviceAccount
        storage: file_storage
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus_remote_write:
        endpoint: 0.0.0.0:9090
    processors:
      batch: {}
      filter:
        error_mode: ignore
        trace_conditions:
          - span.attributes["http.route"] == "/api/v1/status"
          - span.attributes["http.route"] == "/health"
          - span.attributes["url.path"] == "/ping"
      logdedup:
        interval: 60s
        log_count_attribute: dedup_count
        timezone: "America/Los_Angeles"
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
      tail_sampling:
        decision_wait: 10s
        num_traces: 100
        policies:
          - name: errors
            type: status_code
            status_code:
              status_codes: [ERROR]
          - name: slow_traces
            type: latency
            latnecy:
              threshold_ms: 1000
          - name: probabilistic
            type: probabilistic
            probabilistic:
              sampling_percentage: 10
    exporters:
      debug: {}
      otlp_http:
        logs_endpoint: http://victoria-logs.observability.svc.cluster.local:9428/insert/opentelemetry/v1/logs
        metrics_endpoint: &metrics_endpoint http://victoria-metrics.observability.svc.cluster.local:8428/opentelemetry/v1/metrics
        traces_endpoint: http://tempo.observability.svc.cluster.local:4318/v1/traces
        sending_queue:
          storage: file_storage
    service:
      extensions:
        - file_storage
      pipelines:
        logs:
          receivers:
            - k8s_events
            - otlp
          processors:
            - memory_limiter
            - logdedup
            - batch
          exporters:
            - otlp_http
        metrics:
          receivers:
            - prometheus_remote_write
            - otlp
            - servicegraph
          processors:
            - memory_limiter
            - batch
          exporters:
            - otlp_http
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - filter
            - tail_sampling
            - batch # The batch processor should be defined in the pipeline after the memory_limiter as well as any sampling processors.
          exporters:
            - otlp_http
            - servicegraph
      telemetry:
        metrics:
          readers:
            - periodic:
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: *metrics_endpoint
