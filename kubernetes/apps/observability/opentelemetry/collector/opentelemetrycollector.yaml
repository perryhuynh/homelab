---
# yaml-language-server: $schema=https://kubernetes-schemas.perry.cafe/opentelemetry.io/opentelemetrycollector_v1beta1.json
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel
spec:
  mode: daemonset
  serviceAccount: otel-collector
  env:
    - name: KUBE_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
  volumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers
  volumeMounts:
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true
  config:
    connectors:
      servicegraph:
        latency_histogram_buckets: [100ms, 250ms, 1s, 5s, 10s]
        dimensions:
          - db.system
          - db.system.name
          - messaging.system
        virtual_node_peer_attributes:
          - db.system
          - db.system.name
          - messaging.system
          - peer.service
        virtual_node_extra_label: true
    receivers:
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          # Exclude logs from all containers named otel-collector
          - /var/log/pods/*/otel-collector/*.log
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          # parse container logs
          - type: container
            id: container-parser
          - type: json_parser
            on_error: send_quiet
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
      filter/exclude-auto-instrumented:
        logs:
          exclude:
            match_type: regexp
            resource_attributes:
              - key: otel.instrumented
                value: ".*"
      k8s_attributes:
        auth_type: "serviceAccount"
        passthrough: false
        filter:
          # only retrieve pods running on the same node as the collector
          node_from_env_var: KUBE_NODE_NAME
        extract:
          # The attributes provided in 'metadata' will be added to associated resources
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.daemonset.name
            - k8s.deployment.name # Requires watching Deployment resources. To avoid this, use deployment_name_from_replicaset instead.
            - k8s.statefulset.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
            - service.namespace
            - service.name
            - service.version
            - service.instance.id
          annotations:
            - tag_name: otel.autoinstrumented
              key_regex: instrumentation\.opentelemetry\.io/inject-.*
              from: pod
          labels:
            # This label extraction rule takes the value 'app.kubernetes.io/component' label and maps it to the 'app.label.component' attribute which will be added to the associated resources
            - tag_name: app.label.component
              key: app.kubernetes.io/component
              from: pod
          otel_annotations: true
        pod_association:
          - sources:
              # This rule associates all resources containing the 'k8s.pod.ip' attribute with the matching pods. If this attribute is not present in the resource, this rule will not be able to find the matching pod.
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              # This rule associates all resources containing the 'k8s.pod.uid' attribute with the matching pods. If this attribute is not present in the resource, this rule will not be able to find the matching pod.
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              # This rule will use the IP from the incoming connection from which the resource is received, and find the matching pod, based on the 'pod.status.podIP' of the observed pods
              - from: connection
      logdedup:
        interval: 60s
        log_count_attribute: dedup_count
        timezone: "America/Los_Angeles"
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
    exporters:
      debug: {}
      otlp_http:
        logs_endpoint: http://victoria-logs.observability.svc.cluster.local:9428/insert/opentelemetry/v1/logs
        metrics_endpoint: http://victoria-metrics.observability.svc.cluster.local:8428/opentelemetry/v1/metrics
        traces_endpoint: http://tempo.observability.svc.cluster.local:4318/v1/traces
    service:
      pipelines:
        logs/filelog:
          receivers:
            - filelog
          processors:
            - memory_limiter
            - k8s_attributes
            - filter/exclude-auto-instrumented
            - logdedup
            - batch
          exporters:
            - otlp_http
        logs/otlp:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - logdedup
            - batch
          exporters:
            - otlp_http
        metrics/servicegraph:
          receivers:
            - servicegraph
          processors:
            - memory_limiter
            - batch
          exporters:
            - otlp_http
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch # The batch processor should be defined in the pipeline after the memory_limiter as well as any sampling processors.
          exporters:
            - otlp_http
            - servicegraph
