---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/opentelemetry.io/opentelemetrycollector_v1beta1.json
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: events
spec:
  config:
    receivers:
      k8s_events:
        auth_type: serviceAccount
    processors:
      batch: {}
      groupbyattrs:
        keys:
          - k8s.event.reason
          - k8s.object.name
          - k8s.namespace.name
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
    exporters:
      debug:
        verbosity: detailed
      otlp_http:
        endpoint: http://gateway-collector-headless.observability.svc.cluster.local:4318
    service:
      pipelines:
        logs:
          receivers:
            - k8s_events
          processors:
            - memory_limiter
            - groupbyattrs
            - batch
          exporters:
            - otlp_http
      telemetry:
        metrics:
          readers:
            - periodic:
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: http://gateway-collector-headless.observability.svc.cluster.local:4318
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/opentelemetry.io/opentelemetrycollector_v1beta1.json
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: filelog
spec:
  mode: daemonset
  serviceAccount: filelog-collector
  env:
    - name: KUBE_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
  volumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods
  volumeMounts:
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true
  config:
    receivers:
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          # Exclude logs from all containers named otc-container
          - /var/log/pods/*/otc-container/*.log
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          # parse container logs
          - type: container
            id: container-parser
          - type: json_parser
            on_error: send_quiet
    processors:
      batch: {}
      k8s_attributes:
        auth_type: "serviceAccount"
        passthrough: false
        filter:
          # only retrieve pods running on the same node as the collector
          node_from_env_var: KUBE_NODE_NAME
        extract:
          # The attributes provided in 'metadata' will be added to associated resources
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.daemonset.name
            - k8s.deployment.name # Requires watching Deployment resources. To avoid this, use deployment_name_from_replicaset instead.
            - k8s.statefulset.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
            - service.namespace
            - service.name
            - service.version
            - service.instance.id
          labels:
            # This label extraction rule takes the value 'app.kubernetes.io/component' label and maps it to the 'app.label.component' attribute which will be added to the associated resources
            - tag_name: app.label.component
              key: app.kubernetes.io/component
              from: pod
          otel_annotations: true
        pod_association:
          - sources:
              # This rule associates all resources containing the 'k8s.pod.ip' attribute with the matching pods. If this attribute is not present in the resource, this rule will not be able to find the matching pod.
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              # This rule associates all resources containing the 'k8s.pod.uid' attribute with the matching pods. If this attribute is not present in the resource, this rule will not be able to find the matching pod.
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              # This rule will use the IP from the incoming connection from which the resource is received, and find the matching pod, based on the 'pod.status.podIP' of the observed pods
              - from: connection
      logdedup:
        interval: 60s
        log_count_attribute: dedup_count
        timezone: "America/Los_Angeles"
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
    exporters:
      debug: {}
      otlp_http:
        endpoint: http://gateway-collector-headless.observability.svc.cluster.local:4318
    service:
      pipelines:
        logs:
          receivers:
            - filelog
          processors:
            - memory_limiter
            - k8s_attributes
            - logdedup
            - batch
          exporters:
            - otlp_http
      telemetry:
        metrics:
          readers:
            - periodic:
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: http://gateway-collector-headless.observability.svc.cluster.local:4318
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/opentelemetry.io/opentelemetrycollector_v1beta1.json
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: gateway
spec:
  mode: statefulset
  replicas: 2
  volumeMounts:
    - mountPath: /var/lib/otelcol/storage
      name: storage
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
        storageClassName: ceph-block
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - "ALL"
    readOnlyRootFilesystem: true
  podSecurityContext:
    runAsNonRoot: true
    runAsGroup: 1000
    runAsUser: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  config:
    extensions:
      file_storage:
        directory: /var/lib/otelcol/storage
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
      logdedup:
        interval: 60s
        log_count_attribute: dedup_count
        timezone: "America/Los_Angeles"
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
    exporters:
      debug: {}
      otlp_http/logs:
        logs_endpoint: http://victoria-logs.observability.svc.cluster.local:9428/insert/opentelemetry/v1/logs
        headers:
          VL-Stream-Fields: k8s.cluster.name,k8s.namespace.name,k8s.pod.name,k8s.container.name,service.name,service.namespace
        sending_queue:
          storage: file_storage
      otlp_http/metrics:
        metrics_endpoint: &metrics_endpoint http://prometheus-operated.observability.svc.cluster.local:9090/api/v1/otlp/v1/metrics
        sending_queue:
          storage: file_storage
    service:
      extensions:
        - file_storage
      pipelines:
        logs:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - logdedup
            - batch
          exporters:
            - otlp_http/logs
        metrics:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
          exporters:
            - otlp_http/metrics
      telemetry:
        metrics:
          readers:
            - periodic:
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: *metrics_endpoint
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/opentelemetry.io/opentelemetrycollector_v1beta1.json
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: unifi-syslog
spec:
  config:
    receivers:
      syslog:
        udp:
          listen_address: "0.0.0.0:514"
        allow_skip_pri_header: true
        protocol: rfc3164
        location: "America/Los_Angeles"
        attributes:
          service.name: unifi
    processors:
      batch: {}
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
    exporters:
      debug:
        verbosity: detailed
      otlp_http:
        endpoint: http://gateway-collector-headless.observability.svc.cluster.local:4318
    service:
      pipelines:
        logs:
          receivers:
            - syslog
          processors:
            - memory_limiter
            - batch
          exporters:
            - otlp_http
      telemetry:
        metrics:
          readers:
            - periodic:
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: http://gateway-collector-headless.observability.svc.cluster.local:4318
