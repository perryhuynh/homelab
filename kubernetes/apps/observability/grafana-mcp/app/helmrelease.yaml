---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app grafana-mcp
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    extraArgs:
      - --disable-write
      - --transport=streamable-http
      - --endpoint-path=/mcp
      - --address=0.0.0.0:8000
      # mcp-grafana >=0.17.1 blocks DNS rebinding by allowlisting Host; agentgateway
      # forwards the external gateway hostname, so allow it plus the in-cluster service
      - --allowed-hosts=mcp.perryhuynh.com,grafana-mcp.observability.svc.cluster.local:8000
    grafana:
      apiKeySecret:
        name: grafana-mcp-token
        key: token
      url: http://grafana-service.observability.svc.cluster.local:3000
    image:
      registry: mirror.gcr.io
    podAnnotations:
      reloader.stakater.com/auto: "true"
    resources:
      limits:
        memory: 128Mi
      requests:
        cpu: 10m
