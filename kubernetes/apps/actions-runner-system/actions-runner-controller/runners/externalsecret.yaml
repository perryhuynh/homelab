---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: actions-runner
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: actions-runner-secret
    deletionPolicy: Delete
    template:
      engineVersion: v2
      data:
        github_app_id: "{{ .actions_runner_app_id }}"
        github_app_installation_id: "{{ .actions_runner_installation_id }}"
        github_app_private_key: "{{ .actions_runner_private_key }}"
  dataFrom:
    - extract:
        key: github
