---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app seerr
  namespace: &namespace media
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../../components/anubis
    - ../../../../components/gatus/external
    - ../../../../components/volsync
    - ../../../../components/zeroscaler
  dependsOn:
    - name: prometheus-adapter
      namespace: observability
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: plex
      namespace: media
    - name: qbittorrent
      namespace: media
    - name: radarr
      namespace: media
    - name: sonarr
      namespace: media
    - name: volsync
      namespace: volsync-system
  interval: 1h
  path: ./kubernetes/apps/media/seerr/app
  postBuild:
    substitute:
      APP: *app
      ANUBIS_TARGET: http://seerr.media.svc.cluster.local
      GATUS_SUBDOMAIN: canyouadd
      GATUS_PATH: /api/v1/status
      VOLSYNC_CAPACITY: 1Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  wait: true
