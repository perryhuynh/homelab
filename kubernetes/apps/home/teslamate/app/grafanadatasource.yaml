---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: teslamate
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  valuesFrom:
    - targetPath: user
      valueFrom:
        secretKeyRef:
          name: teslamate-secret
          key: DATABASE_USER
    - targetPath: secureJsonData.password
      valueFrom:
        secretKeyRef:
          name: teslamate-secret
          key: DATABASE_PASS
  datasource:
    name: TeslaMate
    uid: teslamate
    type: postgres
    access: proxy
    url: postgres-pgbouncer-rw.database.svc.cluster.local
    user: "${DATABASE_USER}"
    jsonData:
      database: teslamate
      sslmode: disable
      maxOpenConns: 100
      maxIdleConns: 100
      maxIdleConnsAuto: true
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: "${DATABASE_PASS}"
