---
# yaml-language-server: $schema=https://kubernetes-schemas.perry.cafe/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kguardian
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kguardian
  values:
    broker:
      resources:
        limits:
          memory: 2Gi
        requests:
          cpu: 10m
    controller:
      excludedNamespaces:
        - kguardian
    database:
      persistence:
        storageClassName: ceph-block
