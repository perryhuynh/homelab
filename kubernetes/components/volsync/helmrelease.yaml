---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync-unlock-${APP}
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: volsync-unlock-${APP}
  values:
    controllers:
      restic:
        defaultContainerOptionsStrategy: merge
        defaultContainerOptions:
          image:
            repository: mirror.gcr.io/restic/restic
            tag: 0.19.1@sha256:136600b6ff6843d61d355f7f71f460a166429f35de6fd11b568fece3c9a4d510
          envFrom:
            - secretRef:
                name: "${APP}-volsync-secret"
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 10m
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - "ALL"
        type: cronjob
        cronjob:
          schedule: "* * 31 2 *"
          concurrencyPolicy: Forbid
          failedJobsHistory: 1
          successfulJobsHistory: 0
          suspend: true
          timeZone: &timeZone America/Los_Angeles
        initContainers:
          list:
            args:
              - "snapshots"
            env:
              TZ: *timeZone
        containers:
          app:
            args:
              - "unlock"
              - "--remove-all"
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
    persistence:
      repository:
        type: nfs
        path: /mnt/tank/volsync
        server: nas.home.arpa
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /.cache
            subPath: cache
